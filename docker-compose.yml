services:
  podcast-builder:
    build: .
    container_name: ai-podcast-builder
    ports:
      - "26552:8000"
    environment:
      - DATABASE_URL=sqlite:////app/data/podcast.db
      - AUTH_SECRET=please-change-me-in-production
      - AUTH_SESSION_TTL_HOURS=48
      - AUTH_COOKIE_SECURE=false
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=adminadmin
    volumes:
      - ./data:/app/data
    restart: unless-stopped
