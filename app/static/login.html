<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录 - AI Podcast Builder</title>
    <style>
      :root {
        --bg: #0f172a;
        --card: rgba(15, 23, 42, 0.92);
        --line: #334155;
        --text: #e2e8f0;
        --muted: #94a3b8;
        --primary: #3b82f6;
        --primary-hover: #2563eb;
        --error: #ef4444;
        --ok: #22c55e;
        --radius: 12px;
        --radius-sm: 8px;
        --transition: 0.2s ease;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: radial-gradient(ellipse at top, #1e293b, #020617);
        color: var(--text);
      }

      .login-card {
        width: min(470px, 92vw);
        padding: 32px;
        border-radius: 16px;
        border: 1px solid rgba(51, 65, 85, 0.5);
        background: var(--card);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
      }

      .brand {
        text-align: center;
        margin-bottom: 18px;
      }
      .brand-icon {
        font-size: 40px;
        margin-bottom: 8px;
        display: block;
      }
      .brand h1 {
        font-size: 22px;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .brand p {
        color: var(--muted);
        font-size: 14px;
        margin-top: 6px;
      }

      .auth-tabs {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-bottom: 14px;
      }
      .auth-tab {
        border: 1px solid rgba(51, 65, 85, 0.8);
        border-radius: var(--radius-sm);
        background: rgba(11, 18, 32, 0.8);
        color: var(--text);
        padding: 10px;
        cursor: pointer;
      }
      .auth-tab.active {
        border-color: var(--primary);
        background: rgba(59, 130, 246, 0.18);
      }

      label {
        display: block;
        margin: 14px 0 6px;
        color: #cbd5e1;
        font-size: 13px;
        font-weight: 500;
      }

      input {
        width: 100%;
        padding: 11px 14px;
        border: 1px solid rgba(51, 65, 85, 0.8);
        border-radius: var(--radius-sm);
        background: rgba(11, 18, 32, 0.8);
        color: var(--text);
        font-size: 14px;
        outline: none;
        transition: border-color var(--transition), box-shadow var(--transition);
      }
      input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
      }
      input::placeholder { color: rgba(148, 163, 184, 0.5); }

      .submit-btn {
        width: 100%;
        margin-top: 20px;
        border: 0;
        border-radius: var(--radius-sm);
        padding: 12px;
        background: var(--primary);
        color: white;
        cursor: pointer;
        font-size: 15px;
        font-weight: 500;
        transition: all var(--transition);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      .submit-btn:hover { background: var(--primary-hover); transform: translateY(-1px); }
      .submit-btn:active { transform: translateY(0); }
      .submit-btn:disabled {
        opacity: 0.7;
        cursor: not-allowed;
        transform: none !important;
      }

      .btn-spinner {
        width: 16px;
        height: 16px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      .msg {
        min-height: 20px;
        margin-top: 14px;
        padding: 0 4px;
        font-size: 13px;
        text-align: center;
      }
      .msg.error { color: var(--error); }
      .msg.ok { color: var(--ok); }

      .hint {
        margin-top: 16px;
        font-size: 12px;
        color: var(--muted);
        text-align: center;
      }
      code {
        color: #bfdbfe;
        background: rgba(59, 130, 246, 0.1);
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 12px;
      }
      .hidden { display: none !important; }
    </style>
  </head>
  <body>
    <div class="login-card">
      <div class="brand">
        <span class="brand-icon">&#x1F399;</span>
        <h1>AI Podcast Builder</h1>
        <p>登录或注册账号访问控制台</p>
      </div>

      <div class="auth-tabs">
        <button type="button" class="auth-tab active" id="tabLogin">登录</button>
        <button type="button" class="auth-tab" id="tabRegister">注册</button>
      </div>

      <form id="loginForm">
        <label for="username">用户名</label>
        <input id="username" name="username" value="admin" autocomplete="username" required />

        <label for="password">密码</label>
        <input id="password" name="password" type="password" value="adminadmin" autocomplete="current-password" required />

        <button type="submit" class="submit-btn" id="submitBtn">登录</button>
      </form>

      <form id="registerForm" class="hidden">
        <label for="regUsername">用户名</label>
        <input id="regUsername" autocomplete="username" placeholder="请输入用户名" required />

        <label for="regPassword">密码（至少 8 位）</label>
        <input id="regPassword" type="password" autocomplete="new-password" placeholder="请输入密码" required />

        <label for="regConfirmPassword">确认密码</label>
        <input id="regConfirmPassword" type="password" autocomplete="new-password" placeholder="请再次输入密码" required />

        <button type="submit" class="submit-btn" id="registerBtn">注册</button>
      </form>

      <div class="msg" id="authMsg"></div>
      <div class="hint" id="registerHint">默认管理员：<code>admin</code> / <code>adminadmin</code></div>
    </div>

    <script>
      const qs = (id) => document.getElementById(id);
      const tabLogin = qs("tabLogin");
      const tabRegister = qs("tabRegister");
      const loginForm = qs("loginForm");
      const registerForm = qs("registerForm");
      const submitBtn = qs("submitBtn");
      const registerBtn = qs("registerBtn");
      const authMsg = qs("authMsg");
      const registerHint = qs("registerHint");

      let registerOptions = { allow_register: false, require_admin_approval: false };

      function setMsg(type, text) {
        authMsg.className = `msg ${type}`;
        authMsg.textContent = text || "";
      }

      function setLoading(btn, loading, text) {
        if (!btn) return;
        if (loading) {
          btn.disabled = true;
          btn._orig = btn.textContent;
          btn.innerHTML = `<span class="btn-spinner"></span> ${text}`;
        } else {
          btn.disabled = false;
          btn.textContent = btn._orig || btn.textContent;
        }
      }

      function switchMode(mode) {
        const isLogin = mode === "login";
        tabLogin.classList.toggle("active", isLogin);
        tabRegister.classList.toggle("active", !isLogin);
        loginForm.classList.toggle("hidden", !isLogin);
        registerForm.classList.toggle("hidden", isLogin);
        setMsg("", "");
      }

      async function loadRegisterOptions() {
        try {
          const res = await fetch("/api/auth/register-options");
          if (!res.ok) throw new Error("failed");
          registerOptions = await res.json();
        } catch {
          registerOptions = { allow_register: false, require_admin_approval: false };
        }

        if (!registerOptions.allow_register) {
          tabRegister.disabled = true;
          tabRegister.classList.remove("active");
          registerHint.textContent = "当前系统未开放注册，请联系管理员。";
          switchMode("login");
          return;
        }

        registerHint.textContent = registerOptions.require_admin_approval
          ? "当前注册需要管理员审核通过后才能登录。"
          : "注册成功后可直接登录。";
      }

      tabLogin.addEventListener("click", () => switchMode("login"));
      tabRegister.addEventListener("click", () => {
        if (!registerOptions.allow_register) {
          setMsg("error", "当前系统未开放注册");
          return;
        }
        switchMode("register");
      });

      loginForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        setMsg("", "");

        const username = qs("username").value.trim();
        const password = qs("password").value;

        setLoading(submitBtn, true, "登录中...");
        try {
          const res = await fetch("/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password }),
          });
          if (!res.ok) {
            const text = await res.text();
            throw new Error(text || "登录失败");
          }
          window.location.href = "/";
        } catch {
          setMsg("error", "登录失败，请检查用户名或密码");
        } finally {
          setLoading(submitBtn, false, "登录");
        }
      });

      registerForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        setMsg("", "");

        if (!registerOptions.allow_register) {
          setMsg("error", "当前系统未开放注册");
          return;
        }

        const username = qs("regUsername").value.trim();
        const password = qs("regPassword").value;
        const confirmPassword = qs("regConfirmPassword").value;

        if (!username || !password || !confirmPassword) {
          setMsg("error", "请完整填写注册信息");
          return;
        }
        if (password !== confirmPassword) {
          setMsg("error", "两次密码输入不一致");
          return;
        }

        setLoading(registerBtn, true, "注册中...");
        try {
          const res = await fetch("/api/auth/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              username,
              password,
              confirm_password: confirmPassword,
            }),
          });
          const text = await res.text();
          if (!res.ok) {
            throw new Error(text || "注册失败");
          }

          const payload = text ? JSON.parse(text) : {};
          setMsg("ok", payload.message || "注册成功");
          qs("regPassword").value = "";
          qs("regConfirmPassword").value = "";
          if (!payload.pending) {
            qs("username").value = username;
            qs("password").value = "";
            switchMode("login");
          }
        } catch (error) {
          setMsg("error", error.message || "注册失败");
        } finally {
          setLoading(registerBtn, false, "注册");
        }
      });

      loadRegisterOptions();
    </script>
  </body>
</html>
