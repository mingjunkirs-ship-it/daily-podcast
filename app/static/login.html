<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录 - AI Podcast Builder</title>
    <style>
      :root {
        --bg: #0f172a;
        --card: rgba(15, 23, 42, 0.92);
        --line: #334155;
        --text: #e2e8f0;
        --muted: #94a3b8;
        --primary: #3b82f6;
        --primary-hover: #2563eb;
        --error: #ef4444;
        --radius: 12px;
        --radius-sm: 8px;
        --transition: 0.2s ease;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: radial-gradient(ellipse at top, #1e293b, #020617);
        color: var(--text);
      }

      .login-card {
        width: min(420px, 92vw);
        padding: 32px;
        border-radius: 16px;
        border: 1px solid rgba(51, 65, 85, 0.5);
        background: var(--card);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
      }

      .brand {
        text-align: center;
        margin-bottom: 24px;
      }
      .brand-icon {
        font-size: 40px;
        margin-bottom: 8px;
        display: block;
      }
      .brand h1 {
        font-size: 22px;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .brand p {
        color: var(--muted);
        font-size: 14px;
        margin-top: 6px;
      }

      label {
        display: block;
        margin: 14px 0 6px;
        color: #cbd5e1;
        font-size: 13px;
        font-weight: 500;
      }

      input {
        width: 100%;
        padding: 11px 14px;
        border: 1px solid rgba(51, 65, 85, 0.8);
        border-radius: var(--radius-sm);
        background: rgba(11, 18, 32, 0.8);
        color: var(--text);
        font-size: 14px;
        outline: none;
        transition: border-color var(--transition), box-shadow var(--transition);
      }
      input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
      }
      input::placeholder { color: rgba(148, 163, 184, 0.5); }

      .submit-btn {
        width: 100%;
        margin-top: 20px;
        border: 0;
        border-radius: var(--radius-sm);
        padding: 12px;
        background: var(--primary);
        color: white;
        cursor: pointer;
        font-size: 15px;
        font-weight: 500;
        transition: all var(--transition);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      .submit-btn:hover { background: var(--primary-hover); transform: translateY(-1px); }
      .submit-btn:active { transform: translateY(0); }
      .submit-btn:disabled {
        opacity: 0.7;
        cursor: not-allowed;
        transform: none !important;
      }

      .btn-spinner {
        width: 16px;
        height: 16px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      .error-msg {
        min-height: 20px;
        margin-top: 14px;
        padding: 0 4px;
        color: var(--error);
        font-size: 13px;
        text-align: center;
        transition: opacity var(--transition);
      }

      .hint {
        margin-top: 16px;
        font-size: 12px;
        color: var(--muted);
        text-align: center;
      }
      code {
        color: #bfdbfe;
        background: rgba(59, 130, 246, 0.1);
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="login-card">
      <div class="brand">
        <span class="brand-icon">&#x1F399;</span>
        <h1>AI Podcast Builder</h1>
        <p>请输入管理员账号访问控制台</p>
      </div>

      <form id="loginForm">
        <label for="username">用户名</label>
        <input id="username" name="username" value="admin" autocomplete="username" required />

        <label for="password">密码</label>
        <input id="password" name="password" type="password" value="adminadmin" autocomplete="current-password" required />

        <button type="submit" class="submit-btn" id="submitBtn">登录</button>
      </form>

      <div class="error-msg" id="errorMsg"></div>
      <div class="hint">默认账号：<code>admin</code> / <code>adminadmin</code></div>
    </div>

    <script>
      const form = document.getElementById("loginForm");
      const errorMsg = document.getElementById("errorMsg");
      const submitBtn = document.getElementById("submitBtn");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        errorMsg.textContent = "";

        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;

        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="btn-spinner"></span> 登录中...';

        try {
          const res = await fetch("/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password }),
          });
          if (!res.ok) {
            const text = await res.text();
            throw new Error(text || "登录失败");
          }
          window.location.href = "/";
        } catch (error) {
          errorMsg.textContent = "登录失败，请检查用户名或密码。";
          submitBtn.disabled = false;
          submitBtn.innerHTML = "登录";
        }
      });
    </script>
  </body>
</html>
