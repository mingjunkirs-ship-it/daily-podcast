<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录 - AI Podcast Builder</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: radial-gradient(circle at top, #1e293b, #020617);
        color: #e2e8f0;
      }
      .card {
        width: min(420px, 92vw);
        padding: 24px;
        border-radius: 12px;
        border: 1px solid #334155;
        background: rgba(15, 23, 42, 0.92);
      }
      h1 { margin: 0 0 8px; }
      p { color: #94a3b8; font-size: 14px; margin: 0 0 16px; }
      label { display: block; margin: 10px 0 6px; color: #cbd5e1; font-size: 13px; }
      input {
        width: 100%;
        padding: 10px;
        border: 1px solid #334155;
        border-radius: 8px;
        background: #0b1220;
        color: #e2e8f0;
      }
      button {
        width: 100%;
        margin-top: 16px;
        border: 0;
        border-radius: 8px;
        padding: 11px;
        background: #2563eb;
        color: white;
        cursor: pointer;
      }
      .error { min-height: 20px; margin-top: 12px; color: #fca5a5; font-size: 13px; }
      .hint { margin-top: 14px; font-size: 12px; color: #94a3b8; }
      code { color: #bfdbfe; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>登录控制台</h1>
      <p>请输入管理员账号访问 AI Podcast Builder。</p>

      <form id="loginForm">
        <label for="username">用户名</label>
        <input id="username" name="username" value="admin" autocomplete="username" required />

        <label for="password">密码</label>
        <input id="password" name="password" type="password" value="adminadmin" autocomplete="current-password" required />

        <button type="submit">登录</button>
      </form>

      <div class="error" id="errorMsg"></div>
      <div class="hint">默认账号：<code>admin</code> / <code>adminadmin</code></div>
    </div>

    <script>
      const form = document.getElementById("loginForm");
      const errorMsg = document.getElementById("errorMsg");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        errorMsg.textContent = "";

        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;

        try {
          const res = await fetch("/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password }),
          });
          if (!res.ok) {
            const text = await res.text();
            throw new Error(text || "登录失败");
          }
          window.location.href = "/";
        } catch (error) {
          errorMsg.textContent = "登录失败，请检查用户名或密码。";
        }
      });
    </script>
  </body>
</html>
